<div class="example-accordion-controls">
  <mat-checkbox [formControl]="wrap">Wrap (ArrowKey-only)</mat-checkbox>
  <mat-checkbox [formControl]="multi">Multi</mat-checkbox>
  <mat-checkbox [formControl]="disabled">Disabled</mat-checkbox>
  <mat-checkbox [formControl]="softDisabled">Soft Disabled</mat-checkbox>
</div>

<div
  ngAccordionGroup
  class="example-accordion-group"
  [multiExpandable]="multi.value"
  [disabled]="disabled.value"
  [softDisabled]="softDisabled.value"
  [wrap]="wrap.value"
>
  @for (item of items(); track item.panelId) {
    <div class="example-accordion">
      <h3 class="example-accordion-header">
        <button ngAccordionTrigger 
                #trigger="ngAccordionTrigger" 
                class="example-accordion-trigger"
                [disabled]="item.disabled()"
                [(expanded)]="item.expanded"
                [panel]="panel">
          {{item.header}}
          <mat-icon aria-hidden="true">{{trigger.expanded() ? 'expand_less' : 'expand_more'}}</mat-icon>
        </button>
      </h3>
      <div ngAccordionPanel #panel="ngAccordionPanel" class="example-accordion-panel">
        <ng-template ngAccordionContent>
          <p>{{item.content}}</p>
          <label>Input inside panel: <input type="text" /></label>
        </ng-template>
      </div>
    </div>  
  }
</div>
