<div class="example-combobox-container">
  <div #origin class="example-combobox-input-container">
    <input
      ngCombobox
      #combobox="ngCombobox"
      class="example-combobox-input"
      placeholder="Select labels..."
      [value]="displayValue()"
      [(expanded)]="popupExpanded"
      [readonly]="true"
    />
    <span class="material-symbols-outlined example-icon example-arrow-icon">arrow_drop_down</span>
  </div>

  <ng-template
    [cdkConnectedOverlay]="{origin, usePopover: 'inline', matchWidth: true}"
    [cdkConnectedOverlayOpen]="popupExpanded()"
    [cdkConnectedOverlayDisableClose]="true"
  >
    <ng-template ngComboboxPopup [combobox]="combobox">
        <div
          ngListbox
          ngComboboxWidget
          [multi]="true"
          class="example-listbox example-popup"
          focusMode="activedescendant"
          [(values)]="selectedStates"
          (click)="onCommit()"
          (keydown.enter)="onCommit()"
        >
          @for (label of labels; track label.value) {
            <div
              class="example-option example-selectable example-stateful"
              ngOption
              [value]="label.value"
              [label]="label.value"
            >
              <span class="material-symbols-outlined example-icon">{{label.icon}}</span>
              <span>{{label.value}}</span>
              <span
                aria-hidden="true"
                class="material-symbols-outlined example-icon example-selected-icon"
                >check</span
              >
            </div>
          }
      </div>
    </ng-template>
  </ng-template>
</div>
