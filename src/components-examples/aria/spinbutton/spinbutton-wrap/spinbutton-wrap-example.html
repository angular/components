<label id="rating-label">Rating (1-5 stars)</label>

<div ngSpinButtonGroup class="example-spinbutton-group" aria-labelledby="rating-label">
  <button type="button" ngSpinButtonDecrement class="example-spinbutton-btn">−</button>
  <input
    ngSpinButton
    ngSpinButtonInput
    type="text"
    class="example-spinbutton-input"
    [(value)]="rating"
    min="1"
    max="5"
    wrap
    (beforeinput)="onBeforeInput($event)" />
  <button type="button" ngSpinButtonIncrement class="example-spinbutton-btn">+</button>
</div>

<p class="example-help-text">{{ rating() }} stars (wraps 1 ↔ 5)</p>
