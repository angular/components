<div ngTabs>
  <div ngTabList aria-label="Scrollable tabs" selectedTab="tab1">
    @for (i of tabsList; track i) {
      <div ngTab [panel]="'tab' + i">Tab {{i}}</div>
    }
  </div>

  @for (i of tabsList; track i) {
    <div ngTabPanel [id]="'tab' + i">
      <ng-template ngTabContent>Content for Tab {{i}}</ng-template>
    </div>
  }
</div>
