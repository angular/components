<p>Showing {{dataSource.getData().length}} rows</p>

<!-- Enable virtual scrolling -->
<cdk-virtual-scroll-viewport
  class="example-container"
  [itemSize]="52"
  [maxBufferPx]="1200"
  [minBufferPx]="400"
>
  <table mat-table [dataSource]="dataSource" [trackBy]="trackBy">
    <ng-container [matColumnDef]="TableExampleColumn.ID">
      <th *matHeaderCellDef mat-header-cell>Id</th>
      <td *matCellDef="let element" mat-cell data-test="element-id">
        {{ element.id }}
      </td>
    </ng-container>

    <ng-container [matColumnDef]="TableExampleColumn.FIRST_NAME">
      <th *matHeaderCellDef mat-header-cell>First name</th>
      <td *matCellDef="let element" mat-cell data-test="element-first-name">
        {{ element.first_name }}
      </td>
    </ng-container>

    <ng-container [matColumnDef]="TableExampleColumn.LAST_NAME">
      <th *matHeaderCellDef mat-header-cell>Last name</th>
      <td *matCellDef="let element" mat-cell data-test="element-last-name">
        {{ element.last_name }}
      </td>
    </ng-container>

    <ng-container [matColumnDef]="TableExampleColumn.EMAIL">
      <th *matHeaderCellDef mat-header-cell>Email</th>
      <td *matCellDef="let element" mat-cell data-test="element-email">
        {{ element.email }}
      </td>
    </ng-container>

    <ng-container [matColumnDef]="TableExampleColumn.GENDER">
      <th *matHeaderCellDef mat-header-cell>Gender</th>
      <td *matCellDef="let element" mat-cell data-test="element-gender">
        {{ element.gender }}
      </td>
    </ng-container>

    <ng-container [matColumnDef]="TableExampleColumn.IP_ADDRESS">
      <th *matHeaderCellDef mat-header-cell>IP Address</th>
      <td *matCellDef="let element" mat-cell data-test="element-ip-address">
        {{element.ip_address}}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</cdk-virtual-scroll-viewport>

@if (dataSource.isLoading) {
<div class="loading">loading...</div>
}
